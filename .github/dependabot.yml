version: 2
updates:
  # Keep the SHA-pinned actions in this repo's workflows current. Review every
  # PR before merge; never auto-merge (a SHA bump is executable CI logic). This
  # repo carries no composite actions of its own, so the single "/" target
  # (which scans .github/workflows) is sufficient.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
    # Delay version bumps so a compromised or yanked release is caught before we
    # adopt it; security updates bypass cooldown. Defense-in-depth for the
    # SHA-rewrite supply-chain risk that motivates SHA-pinning.
    cooldown:
      default-days: 7
    # Collapse all action bumps into a single PR to cut review noise.
    groups:
      github-actions:
        patterns:
          - '*'
