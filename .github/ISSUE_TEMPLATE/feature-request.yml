name: Feature Request
description: Propose a new feature or enhancement.
type: Feature
labels: ["priority: needs-triage"]
body:
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Who benefits and why?
      placeholder: "As a [role], I want [capability] so that [benefit]."
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected area / component
      description: Which part of the project would this affect? (optional)
    validations:
      required: false
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
